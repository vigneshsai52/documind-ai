<!DOCTYPE html>
<html>
<head>
    <title>DocuMind AI - Free Document Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { opacity: 0.9; }

        .badge {
            display: inline-block;
            background: #4ade80;
            color: #064e3b;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .supported-types {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .type-badge {
            background: #f0f0ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #dde;
        }

        input[type="file"] { display: none; }

        .btn {
            background: #667eea;
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:hover { background: #5a6fd6; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
        }

        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-box pre {
            white-space: pre-wrap;
            font-family: inherit;
            line-height: 1.6;
            color: #444;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 DocuMind AI</h1>
            <p>Upload any document. Get instant AI analysis.</p>
            <span class="badge">⚡ Powered by FREE Groq AI</span>
        </header>

        <div class="card">
            <div class="upload-area" onclick="document.getElementById('file').click()">
                <div class="upload-icon">📄</div>
                <h3>Drop your document here or click to browse</h3>

                <div class="supported-types">
                    <span class="type-badge">PDF</span>
                    <span class="type-badge">DOCX</span>
                    <span class="type-badge">DOC</span>
                    <span class="type-badge">TXT</span>
                </div>

                <p style="margin-top: 10px;">Maximum file size: 10MB</p>

                <input type="file" id="file" accept=".pdf,.docx,.doc,.txt" onchange="updateFileName()">

                <p class="file-name" id="fileName"></p>

                <button class="btn" id="analyzeBtn" onclick="analyze()" disabled>
                    Analyze Document
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing with FREE AI...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h3>✅ Analysis Complete</h3>

                <div class="result-box">
                    <pre id="analysisText"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateFileName() {
            const file = document.getElementById('file').files[0];
            if (file) {
                document.getElementById('fileName').textContent = "Selected: " + file.name;
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        async function analyze() {
            const file = document.getElementById('file').files[0];
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const btn = document.getElementById('analyzeBtn');

            result.style.display = 'none';
            error.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(
                    'https://documind-ai-production-ce16.up.railway.app/analyze',
                    { method: 'POST', body: formData }
                );

                const data = await response.json();
                loading.style.display = 'none';

                if (data.error) {
                    error.textContent = '❌ ' + data.error;
                    error.style.display = 'block';
                } else {
                    document.getElementById('analysisText').textContent = data.analysis;
                    result.style.display = 'block';
                }
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = '❌ Failed to connect to server. Make sure it is running.';
                error.style.display = 'block';
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
